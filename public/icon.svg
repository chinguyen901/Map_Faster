<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1E90FF"/>
  <!-- Wallet body -->
  <rect x="80" y="160" width="352" height="240" rx="32" fill="white" opacity="0.15"/>
  <rect x="80" y="160" width="352" height="240" rx="32" fill="none" stroke="white" stroke-width="16"/>
  <!-- Wallet flap top -->
  <rect x="80" y="140" width="352" height="60" rx="20" fill="white" opacity="0.25"/>
  <!-- Coin circle -->
  <circle cx="340" cy="282" r="52" fill="white" opacity="0.2"/>
  <circle cx="340" cy="282" r="52" fill="none" stroke="white" stroke-width="12"/>
  <!-- Dong symbol ₫ -->
  <text x="256" y="310" text-anchor="middle" font-family="'Arial', sans-serif" font-size="140" font-weight="900" fill="white">₫</text>
  <!-- Small decorative lines -->
  <rect x="120" y="340" width="140" height="12" rx="6" fill="white" opacity="0.5"/>
  <rect x="120" y="362" width="100" height="10" rx="5" fill="white" opacity="0.3"/>
</svg>
